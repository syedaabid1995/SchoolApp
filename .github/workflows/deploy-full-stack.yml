name: Deploy Full Stack to Lightsail

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'admin/**'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check for backend changes
      uses: dorny/paths-filter@v2
      id: backend-changes
      with:
        filters: |
          backend:
            - 'backend/**'
            
    - name: Configure AWS credentials
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Install Lightsail CLI
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        curl -o lightsailctl https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl
        chmod +x lightsailctl
        sudo mv lightsailctl /usr/local/bin/

    - name: Validate Backend Lightsail Service
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      env:
        SERVICE_NAME: ${{ secrets.LIGHTSAIL_BACKEND_SERVICE }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        if [ -z "$SERVICE_NAME" ]; then
          echo "::error::GitHub secret LIGHTSAIL_BACKEND_SERVICE is empty."
          exit 1
        fi

        if ! aws lightsail get-container-services \
          --service-name "$SERVICE_NAME" \
          --region "$AWS_REGION" >/tmp/backend-lightsail-service.json; then
          echo "::error::Backend Lightsail container service was not found in region '$AWS_REGION'. Create the service or fix LIGHTSAIL_BACKEND_SERVICE/AWS_REGION secrets."
          echo "Container services visible in this region:"
          aws lightsail get-container-services \
            --region "$AWS_REGION" \
            --query "containerServices[].containerServiceName" \
            --output table || true
          exit 1
        fi

    - name: Setup Node.js for Prisma migrations
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: backend/package-lock.json

    - name: Install backend dependencies for Prisma
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      working-directory: backend
      run: npm ci --include=dev

    - name: Run backend database migrations
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      working-directory: backend
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: npx prisma migrate deploy
        
    - name: Build and Push Backend
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      working-directory: .
      run: |
        docker build --platform linux/amd64 \
          -f docker/backend/Dockerfile \
          -t school-backend-local:latest \
          backend/
        
        # Push with SHORT label
        aws lightsail push-container-image \
          --service-name ${{ secrets.LIGHTSAIL_BACKEND_SERVICE }} \
          --label backend \
          --image school-backend-local:latest \
          --region ${{ secrets.AWS_REGION }}

    - name: Resolve latest backend image
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        IMAGE=$(aws lightsail get-container-images \
          --service-name ${{ secrets.LIGHTSAIL_BACKEND_SERVICE }} \
          --region ${{ secrets.AWS_REGION }} \
          --query "containerImages[?contains(image, 'backend')] | sort_by(@, &createdAt)[-1].image" \
          --output text)
        if [ -z "$IMAGE" ] || [ "$IMAGE" = "None" ]; then
          echo "Failed to resolve backend image reference" >&2
          exit 1
        fi
        echo "BACKEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

    - name: Deploy Backend
      if: steps.backend-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        cat > backend-deployment.json <<EOF
        {
          "backend": {
            "image": "${BACKEND_IMAGE}",
            "ports": {"3000": "HTTP"},
            "environment": {
              "NODE_ENV": "production",
              "PORT": "3000",
              "CORS_ORIGINS": "${{ secrets.CORS_ORIGINS }}",
              "DATABASE_URL": "${{ secrets.DATABASE_URL }}",
              "JWT_SECRET": "${{ secrets.JWT_SECRET }}",
              "REDIS_URL": "${{ secrets.REDIS_URL }}",
              "AWS_ACCESS_KEY_ID": "${{ secrets.AWS_ACCESS_KEY_ID }}",
              "AWS_SECRET_ACCESS_KEY": "${{ secrets.AWS_SECRET_ACCESS_KEY }}",
              "AWS_REGION": "${{ secrets.AWS_REGION }}",
              "AWS_S3_BUCKET": "${{ secrets.AWS_S3_BUCKET }}"
            }
          }
        }
        EOF

        cat > backend-endpoint.json <<EOF
        {
          "containerName": "backend",
          "containerPort": 3000,
          "healthCheck": {"path": "/health"}
        }
        EOF

        aws lightsail create-container-service-deployment \
          --service-name ${{ secrets.LIGHTSAIL_BACKEND_SERVICE }} \
          --containers file://backend-deployment.json \
          --public-endpoint file://backend-endpoint.json \
          --region ${{ secrets.AWS_REGION }}

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check for admin changes
      uses: dorny/paths-filter@v2
      id: admin-changes
      with:
        filters: |
          admin:
            - 'admin/**'
            
    - name: Configure AWS credentials
      if: steps.admin-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Install Lightsail CLI
      if: steps.admin-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        curl -o lightsailctl https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl
        chmod +x lightsailctl
        sudo mv lightsailctl /usr/local/bin/

    - name: Validate Frontend Lightsail Service
      if: steps.admin-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
      env:
        SERVICE_NAME: ${{ secrets.LIGHTSAIL_FRONTEND_SERVICE }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        if [ -z "$SERVICE_NAME" ]; then
          echo "::error::GitHub secret LIGHTSAIL_FRONTEND_SERVICE is empty."
          exit 1
        fi

        if ! aws lightsail get-container-services \
          --service-name "$SERVICE_NAME" \
          --region "$AWS_REGION" >/tmp/frontend-lightsail-service.json; then
          echo "::error::Frontend Lightsail container service was not found in region '$AWS_REGION'. Create the service or fix LIGHTSAIL_FRONTEND_SERVICE/AWS_REGION secrets."
          echo "Container services visible in this region:"
          aws lightsail get-container-services \
            --region "$AWS_REGION" \
            --query "containerServices[].containerServiceName" \
            --output table || true
          exit 1
        fi
        
    - name: Build and Push Frontend
      if: steps.admin-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
      working-directory: .
      run: |
        docker build --platform linux/amd64 --no-cache \
          --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
          --build-arg API_BASE_URL=${{ secrets.API_BASE_URL }} \
          -f docker/admin/Dockerfile \
          -t school-frontend-local:latest \
          admin/
        
        # Push with SHORT label
        aws lightsail push-container-image \
          --service-name ${{ secrets.LIGHTSAIL_FRONTEND_SERVICE }} \
          --label frontend \
          --image school-frontend-local:latest \
          --region ${{ secrets.AWS_REGION }}

    - name: Resolve latest frontend image
      if: steps.admin-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        # Debug: List all images in service
        echo "All images in service:"
        aws lightsail get-container-images \
          --service-name ${{ secrets.LIGHTSAIL_FRONTEND_SERVICE }} \
          --region ${{ secrets.AWS_REGION }}
          
        IMAGE=$(aws lightsail get-container-images \
          --service-name ${{ secrets.LIGHTSAIL_FRONTEND_SERVICE }} \
          --region ${{ secrets.AWS_REGION }} \
          --query "containerImages[?contains(image, 'frontend')] | sort_by(@, &createdAt)[-1].image" \
          --output text)
        if [ -z "$IMAGE" ] || [ "$IMAGE" = "None" ]; then
          echo "Failed to resolve frontend image reference" >&2
          exit 1
        fi
        echo "FRONTEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

    - name: Deploy Frontend
      if: steps.admin-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        cat > frontend-deployment.json <<EOF
        {
          "frontend": {
            "image": "${FRONTEND_IMAGE}",
            "ports": {"3000": "HTTP"}
          }
        }
        EOF

        cat > frontend-endpoint.json <<EOF
        {
          "containerName": "frontend",
          "containerPort": 3000,
          "healthCheck": {"path": "/"}
        }
        EOF

        aws lightsail create-container-service-deployment \
          --service-name ${{ secrets.LIGHTSAIL_FRONTEND_SERVICE }} \
          --containers file://frontend-deployment.json \
          --public-endpoint file://frontend-endpoint.json \
          --region ${{ secrets.AWS_REGION }}
